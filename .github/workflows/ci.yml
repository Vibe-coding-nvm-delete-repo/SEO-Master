name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --ignore-scripts
      - run: npm install --ignore-scripts esbuild-wasm @rollup/wasm-node @tailwindcss/oxide-wasm32-wasi --force
      - run: node scripts/patch-wasm.cjs
      - run: npx tsc --noEmit
      - run: NAPI_RS_FORCE_WASI=1 npx vitest run
      - run: NAPI_RS_FORCE_WASI=1 npx vite build
